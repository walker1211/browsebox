mihomo:
  controller_socket: /tmp/verge/verge-mihomo.sock
  # config_path: ~/.config/mihomo/config.yaml
  # binary_path: verge-mihomo
  # 强制临时 mihomo 出站走指定网卡，常用于避免被主 Clash Verge/TUN 干扰。
  # interface_name: en0

browser:
  # chrome_path: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
  # 留空时使用每次会话自动创建的隔离临时 profile；需要固定登录态时再设置。
  profile_dir: ""
  # browser-mcp / CDP 自动化可设为 true；手动登录和排查问题时建议保持 false。
  headless: false
  # 额外 Chrome 启动参数；使用 block list 或 []，每项可以带或不带开头的 --。
  chrome_args:
    - no-first-run
    - no-default-browser-check
    - disable-background-networking
    - disable-component-update

runtime:
  # dir: /tmp/browsebox
  # cache_dir: ~/.cache/browsebox/mihomo
  state_dir: ~/.browsebox
  keep: false

ports:
  proxy: 17997
  controller: 17998
  devtools: 9223

session:
  # 留空时自动匹配当前 Clash/mihomo 选择的代理组；也可以填固定组名，例如 XFLTD。
  group: ""
  node: ""
  url: https://x.com/OpenAI
  health_urls:
    - https://x.com
    - https://abs.twimg.com

nodes:
  concurrency: 16
  delay_timeout_ms: 5000
  show_unhealthy: false
  highlight_current: true
