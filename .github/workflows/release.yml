name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Secret scan history
        run: scripts/secret-scan.sh --history

      - name: Local CI
        run: scripts/ci-local.sh clean

  build:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            ext: ""
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            ext: ""
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            ext: ""
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          package="browsebox-${SUFFIX}"
          mkdir -p "dist/${package}/configs"
          go build -trimpath -ldflags="-s -w" -o "dist/${package}/browsebox${EXT}" ./cmd/browsebox
          go build -trimpath -ldflags="-s -w" -o "dist/${package}/browsebox-skill-sync${EXT}" ./cmd/skill-sync
          cp LICENSE README.md README.zh-CN.md README.en.md "dist/${package}/"
          cp configs/config.example.yaml "dist/${package}/configs/config.example.yaml"
          tar -C dist -czf "dist/${package}.tar.gz" "$package"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: browsebox-${{ matrix.suffix }}
          path: dist/browsebox-${{ matrix.suffix }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --verify-tag --title "$TAG_NAME" --notes "Release $TAG_NAME"
          fi
